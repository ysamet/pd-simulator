# Base config for tft_invasion.yaml. The sweep REPLACES population.composition
# per member (the three-bucket resolution) and sets the seed, so the values
# here are the shared backdrop: a 40-agent population, short matches, and
# meaningful selection so the invasion threshold is visible in a few
# generations. The composition below is a valid placeholder only.
seed: 1
population:
  size: 40
  composition:
    tit_for_tat: 2
    always_defect: 38
match:
  length_mode: fixed
  rounds_per_match: 10
dynamics:
  generations: 40
  selection_beta: 1.0
  mutation_rate: 0.0
